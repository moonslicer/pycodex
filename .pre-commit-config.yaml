minimum_pre_commit_version: "3.6.0"
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--strict, pycodex/]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.0

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (non-e2e, non-agent-harness)
        entry: python -m pytest tests/ -m "not e2e and not agent_harness" -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest-agent-harness
        name: pytest (agent_harness)
        entry: python -m pytest tests/agent_harness/ -q
        language: system
        pass_filenames: false
        stages: [pre-push]
