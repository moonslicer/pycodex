name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio pydantic

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format . --check

      - name: Mypy strict
        run: mypy --strict pycodex/

      - name: Pytest suite
        run: pytest tests/ -v

      - name: Agent harness
        run: pytest tests/agent_harness/ -v
