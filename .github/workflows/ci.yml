name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format . --check

  typecheck-and-unit:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install tooling
        run: pip install mypy pytest pytest-asyncio pydantic

      - name: Mypy strict
        run: mypy --strict pycodex/

      - name: Pytest (unit + integration, no e2e/harness)
        run: pytest tests/ --ignore=tests/agent_harness -m "not e2e" -v

  harness-and-security:
    needs: typecheck-and-unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install tooling
        run: pip install pytest pytest-asyncio pydantic pip-audit bandit

      - name: Agent harness
        run: pytest tests/agent_harness/ -v

      - name: Dependency audit
        run: pip-audit
        continue-on-error: true

      - name: Security scan (bandit)
        run: bandit -r pycodex/ -ll -q
        continue-on-error: true

      - name: E2E (PR to main only)
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: pytest tests/ -m "e2e" -v
