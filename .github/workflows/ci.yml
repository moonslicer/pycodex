name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for secret scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard local absolute paths
        run: |
          if git grep -nE \
            '(/Users/[[:alnum:]_.-]+|/home/[[:alnum:]_.-]+|[A-Za-z]:\\Users\\[[:alnum:]_.-]+)' \
            -- . ":(exclude)*.png" ":(exclude)*.jpg" ":(exclude)*.svg"; then
            echo "Found local absolute paths in tracked content. Redact before merge."
            exit 1
          fi

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format . --check

  typecheck-and-unit:
    needs: [secret-scan, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install tooling
        run: pip install ".[dev]"

      - name: Mypy strict
        run: mypy --strict pycodex/

      - name: Pytest (unit + integration, no e2e/harness)
        run: pytest tests/ --ignore=tests/agent_harness -m "not e2e" -v

  harness-and-security:
    needs: typecheck-and-unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install tooling
        run: pip install ".[dev]"

      - name: Agent harness
        run: pytest tests/agent_harness/ -v

      - name: Dependency audit
        run: pip-audit

      - name: Security scan (bandit)
        run: bandit -r pycodex/ -ll -q

      - name: E2E (PR to main only)
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: pytest tests/ -m "e2e" -v
